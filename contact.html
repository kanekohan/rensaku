<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜レンサク</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Noto Sans JP', sans-serif; background: #f0f6ff; color: #0d2a4e; line-height: 1.8; }
header { background: #0d2a4e; padding: 20px 40px; display: flex; align-items: center; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: #f0f6ff; text-decoration: none; }
.logo span { color: #3b97f7; }
.container { max-width: 700px; margin: 60px auto; padding: 0 20px; }
h1 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
h1 span { color: #1a7fe8; }
.lead { font-size: 14px; color: #5a7fa8; margin-bottom: 40px; }
.form-card { background: white; border: 1px solid #c5dcf3; border-radius: 10px; padding: 32px; }
.form-group { margin-bottom: 24px; }
label { display: block; font-size: 13px; font-weight: 700; color: #0d2a4e; margin-bottom: 8px; }
label span { color: #ef4444; margin-left: 4px; font-size: 11px; }
input[type="text"], input[type="email"], select, textarea {
  width: 100%; padding: 12px 16px; border: 1px solid #c5dcf3;
  border-radius: 6px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
  background: #f8faff; color: #0d2a4e; outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus, textarea:focus { border-color: #1a7fe8; background: white; }
textarea { resize: vertical; min-height: 160px; }
.btn { background: #1a7fe8; color: white; border: none; padding: 14px 40px; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; font-family: 'Noto Sans JP', sans-serif; transition: background 0.2s; }
.btn:hover { background: #1565c0; }
.note { font-size: 12px; color: #5a7fa8; margin-top: 16px; text-align: center; }
.success { display: none; background: #dcfce7; border: 1px solid #86efac; border-radius: 10px; padding: 24px; text-align: center; }
.success h2 { color: #166534; font-size: 18px; margin-bottom: 8px; }
.success p { color: #166534; font-size: 14px; }
.info-box { background: #dbeafe; border-left: 4px solid #1a7fe8; border-radius: 0 6px 6px 0; padding: 14px 18px; margin-bottom: 32px; font-size: 13px; color: #1d4ed8; }
footer { background: #0d2a4e; color: #f0f6ff; padding: 40px; margin-top: 80px; }
.footer-inner { max-width: 700px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-start; gap: 40px; flex-wrap: wrap; }
.footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; }
.footer-logo span { color: #3b97f7; }
.footer-links a { color: #7aabce; text-decoration: none; font-size: 13px; display: block; margin-bottom: 8px; }
.footer-links a:hover { color: #f0f6ff; }
.footer-copy { max-width: 700px; margin: 24px auto 0; padding-top: 24px; border-top: 1px solid #1a3f6e; font-size: 12px; color: #5a7fa8; }
@media (max-width: 600px) { header { padding: 16px 20px; } .form-card { padding: 20px; } }
</style>
</head>
<body>

<header>
  <a href="./index.html" class="logo">レン<span>サク</span></a>
</header>

<div class="container">
  <h1>お問い<span>合わせ</span></h1>
  <p class="lead">掲載内容の修正・追加依頼、その他ご意見・ご要望はこちらからお送りください。</p>

  <div class="info-box">
    ⏱ 通常2〜5営業日以内にご返信いたします。お急ぎの場合はご了承ください。
  </div>

  <div class="form-card">
    <div id="form-area">
      <div class="form-group">
        <label>お名前<span>必須</span></label>
        <input type="text" id="name" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label>メールアドレス<span>必須</span></label>
        <input type="email" id="email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label>お問い合わせ種別<span>必須</span></label>
        <select id="category">
          <option value="">選択してください</option>
          <option value="listing">掲載情報の修正・更新依頼</option>
          <option value="new">新規掲載のご相談</option>
          <option value="paid">有料掲載プランについて</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>お問い合わせ内容<span>必須</span></label>
        <textarea id="message" placeholder="お問い合わせ内容をご記入ください"></textarea>
      </div>
      <button class="btn" onclick="submitForm()">送信する</button>
      <p class="note">送信いただいた情報は、お問い合わせ対応のみに使用します。<br><a href="./privacy-policy.html" style="color:#1a7fe8;">プライバシーポリシー</a>をご確認ください。</p>
    </div>

    <div class="success" id="success-msg">
      <h2>✅ 送信が完了しました</h2>
      <p>お問い合わせありがとうございます。<br>内容を確認のうえ、ご返信いたします。</p>
    </div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <div>
      <div class="footer-logo">レン<span>サク</span></div>
      <p style="font-size:13px;color:#5a7fa8;margin-top:8px;">仮設資材会社 検索プラットフォーム</p>
    </div>
    <div class="footer-links">
      <a href="./index.html">トップページ</a>
      <a href="./about.html">レンサクについて</a>
      <a href="./contact.html">お問い合わせ</a>
      <a href="./privacy-policy.html">プライバシーポリシー</a>
    </div>
  </div>
  <div class="footer-copy">© 2026 レンサク. All rights reserved.</div>
</footer>

<script>
function submitForm() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const category = document.getElementById('category').value;
  const message = document.getElementById('message').value.trim();

  if (!name || !email || !category || !message) {
    alert('すべての必須項目を入力してください。');
    return;
  }
  if (!email.includes('@')) {
    alert('正しいメールアドレスを入力してください。');
    return;
  }

  document.getElementById('form-area').style.display = 'none';
  document.getElementById('success-msg').style.display = 'block';
}
</script>

</body>
</html>
